name: Debug APK Release

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_debug_apk:
    name: "Build Debug APK & Create Release"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK 35 with NDK (side-by-side)
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platform-tools
            platforms;android-35
            build-tools;35.0.0
            ndk;27.0.12077973

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode google-services.json
        env:
          DEBUG_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.DEBUG_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$DEBUG_GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "No secret set. Generating placeholder google-services.json for CI."
            cat > app/google-services.json << 'GSEOF'
          {
            "project_info": { "project_number": "000000000000", "project_id": "placeholder", "storage_bucket": "placeholder.appspot.com" },
            "client": [{ "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "com.android.developers.androidify" } }, "oauth_client": [], "api_key": [{ "current_key": "AIzaSyPlaceholderKeyForCIBuilds000000" }], "services": { "appinvite_service": { "other_platform_oauth_client": [] } } }],
            "configuration_version": "1"
          }
          GSEOF
          else
            echo "Decoding DEBUG_GOOGLE_SERVICES_JSON_BASE64."
            echo "$DEBUG_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
          fi

      - name: Build debug APK
        id: build
        run: |
          set +e
          ./gradlew assembleDebug --no-configuration-cache --stacktrace 2>&1 | tee build_output.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -100 build_output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          exit $BUILD_EXIT

      - name: Get APK path and build info
        id: apk_info
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH_NAME=${GITHUB_REF_NAME//\//-}
          TAG_NAME="debug-${BRANCH_NAME}-${SHORT_SHA}"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release with debug APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.apk_info.outputs.tag_name }}
          name: "Debug Build - ${{ steps.apk_info.outputs.branch_name }} (${{ steps.apk_info.outputs.short_sha }})"
          body: |
            **Debug APK** built from branch `${{ github.ref_name }}` at commit `${{ github.sha }}`.

            - **Branch:** ${{ github.ref_name }}
            - **Commit:** ${{ github.sha }}
            - **Triggered by:** ${{ github.actor }}
          prerelease: true
          make_latest: false
          files: ${{ steps.apk_info.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
